<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0d0f12;padding:24px;color:#e3e5e7}

.toggle-row{display:flex;gap:8px;margin-bottom:16px;align-items:center;font-size:12px;color:#858c93}
.tgl{padding:5px 14px;border-radius:20px;font-size:11px;cursor:pointer;border:0.5px solid;font-family:inherit;transition:all .15s}

.dark{
  --pg:#111317;--sf:#181B1F;--ra:#1F2227;
  --t1:#E3E5E7;--t2:#858C93;--t3:#4B5159;
  --b1:#2B2F35;--b2:#343940;
  --col-div:rgba(117,168,177,0.15);
  --ac:#75A8B1;
  --gr:#56B378;--am:#D6A95B;--bl:#6B9ED0;--re:#D36F68;--pu:#9883C7;
  --today:rgba(117,168,177,0.55);
}
.light{
  --pg:#F4F7F8;--sf:#E8EFF1;--ra:#DAE5E7;
  --t1:#1E2B2D;--t2:#5A7275;--t3:#8DA4A7;
  --b1:#C8D9DC;--b2:#D5E2E4;
  --col-div:rgba(75,138,148,0.2);
  --ac:#3A8A97;
  --gr:#2B6B3E;--am:#A8751E;--bl:#2563A8;--re:#B84040;--pu:#5E4B9A;
  --today:rgba(58,138,151,0.6);
}

.wrap{border-radius:10px;overflow:hidden;border:0.5px solid var(--b1);background:var(--pg);font-size:12px}

.hdr{background:var(--sf);padding:11px 16px 10px;border-bottom:0.5px solid var(--b1);display:flex;align-items:center;gap:10px}
.hdr-title{font-size:13px;font-weight:600;color:var(--t1)}
.hdr-sub{font-size:9px;color:var(--t3);letter-spacing:.04em;margin-top:1px}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:5px}
.hdr-btn{padding:4px 10px;border-radius:5px;border:0.5px solid var(--b2);background:transparent;font-size:11px;color:var(--t2);cursor:pointer;font-family:inherit}
.hdr-nav{width:22px;height:22px;border-radius:5px;border:0.5px solid var(--b2);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--t2);font-size:10px}
.hdr-range{font-size:11px;color:var(--t2);margin:0 4px}

.c-dev {width:120px;flex-shrink:0}
.c-fn  {width:170px;flex-shrink:0}
.c-rel {width:62px; flex-shrink:0}
.c-prog{width:88px; flex-shrink:0}
.c-tl  {flex:1;min-width:0}

.col-hdr{display:flex;align-items:flex-end;padding:0 8px 7px;height:52px;
         background:var(--ra);border-bottom:0.5px solid var(--b1);
         font-size:8.5px;color:var(--t3);letter-spacing:.05em;text-transform:uppercase}
.col-hdr.dev {border-right:0.5px solid var(--col-div)}
.col-hdr.fn  {border-right:0.5px solid var(--b2)}
.col-hdr.rel {border-right:0.5px solid var(--b2);justify-content:center;padding-bottom:7px}
.col-hdr.prog{border-right:0.5px solid var(--b1);justify-content:center}

.th-wrap{flex:1;background:var(--ra);border-bottom:0.5px solid var(--b1)}
.th-qtrs{display:flex;height:22px;border-bottom:0.5px solid var(--b2)}
.th-q{display:flex;align-items:center;padding:0 8px;font-size:9px;color:var(--ac);
      letter-spacing:.05em;text-transform:uppercase;border-right:0.5px solid var(--b2);
      flex-shrink:0;font-weight:500}
.th-months{display:flex;height:30px}
.th-m{display:flex;align-items:center;padding:0 8px;font-size:10px;color:var(--t3);
      border-right:0.5px solid var(--b2);flex-shrink:0;white-space:nowrap}
.th-m.cur{color:var(--t1);font-weight:500}

.row{display:flex;border-bottom:0.5px solid var(--b1)}

/* ── TYPE TAGS ── */
.tag{font-size:8px;font-weight:600;padding:1px 5px;border-radius:4px;
     letter-spacing:.03em;flex-shrink:0;line-height:14px}
.tag-enh{background:rgba(107,158,208,.12);color:var(--bl);border:0.5px solid rgba(107,158,208,.25)}
.tag-bug{background:rgba(211,111,104,.12);color:var(--re);border:0.5px solid rgba(211,111,104,.25)}

/* ── RELEASE PILLS ── */
.rel-pill{font-size:9px;font-weight:600;padding:2px 6px;border-radius:10px;letter-spacing:.02em}
.rel-r1{background:rgba(211,111,104,.15);color:var(--re);border:0.5px solid rgba(211,111,104,.3)}
.rel-r2{background:rgba(107,158,208,.15);color:var(--bl);border:0.5px solid rgba(107,158,208,.3)}
.rel-r3{background:rgba(86,179,120,.15); color:var(--gr);border:0.5px solid rgba(86,179,120,.3)}
.rel-r4{background:rgba(152,131,199,.15);color:var(--pu);border:0.5px solid rgba(152,131,199,.3)}

/* ── PROGRESS ── */
.prog-wrap{display:flex;flex-direction:column;gap:3px;width:100%}
.prog-label{font-size:9px;color:var(--t2);line-height:1}
.prog-track{height:4px;border-radius:2px;background:rgba(255,255,255,.08);overflow:hidden}
.prog-fill{height:100%;border-radius:2px}

/* ── TIMELINE ── */
.tl-rel-line{position:absolute;top:0;bottom:0;width:1.5px;background:rgba(211,111,104,.35);z-index:8;pointer-events:none}
.tl-rel-lbl {position:absolute;top:2px;font-size:8px;color:var(--re);transform:translateX(-50%);z-index:9;font-weight:500;pointer-events:none}
.tl-today   {position:absolute;top:0;bottom:0;width:1.5px;background:var(--today);z-index:10;pointer-events:none}
.tl-today-lbl{position:absolute;top:2px;font-size:8px;color:var(--ac);transform:translateX(-50%);z-index:11;letter-spacing:.03em;pointer-events:none}
.tl-mdiv    {position:absolute;top:0;bottom:0;width:0.5px;background:var(--b1);pointer-events:none}
.tl-bar     {position:absolute;height:10px;border-radius:3px;top:50%;transform:translateY(-50%);overflow:hidden;display:flex}
.tl-fn-bar  {position:absolute;height:4px;border-radius:2px;top:50%;transform:translateY(-50%);opacity:.18}
.tl-ms      {position:absolute;width:9px;height:9px;transform:rotate(45deg);top:50%;margin-top:-4.5px;border-radius:1.5px;z-index:5}

.legend{display:flex;gap:14px;padding:9px 14px;border-top:0.5px solid var(--b1);background:var(--sf);flex-wrap:wrap}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
.leg-sw{width:14px;height:6px;border-radius:2px}
.leg-di{width:8px;height:8px;transform:rotate(45deg);border-radius:1px}
.leg-ln{width:1.5px;height:12px;border-radius:1px}
.leg-sep{width:0.5px;background:var(--b2);height:14px;margin:0 2px}
.leg-tag{font-size:8px;font-weight:600;padding:1px 5px;border-radius:4px}
</style>
</head>
<body>

<div class="toggle-row">
  Theme:
  <button class="tgl" id="tgl-dark"  onclick="setMode('dark')">Dark</button>
  <button class="tgl" id="tgl-light" onclick="setMode('light')">Light</button>
</div>

<div class="wrap dark" id="gantt">

  <div class="hdr">
    <div>
      <div class="hdr-title">Delivery Timeline</div>
      <div class="hdr-sub">Developer › Function › Enhancement / Bug &nbsp;·&nbsp; Click ▼/▶ to expand</div>
    </div>
    <div class="hdr-right">
      <div class="hdr-nav">◀</div>
      <button class="hdr-btn">Today</button>
      <div class="hdr-nav">▶</div>
      <span class="hdr-range">Jan 2026 – Dec 2026</span>
    </div>
  </div>

  <div style="display:flex">
    <div class="col-hdr dev c-dev">Developer</div>
    <div class="col-hdr fn  c-fn" >Function / Enhancement</div>
    <div class="col-hdr rel c-rel">Release</div>
    <div class="col-hdr prog c-prog" style="font-size:8.5px">Progress</div>
    <div class="th-wrap c-tl" id="th-wrap">
      <div class="th-qtrs" id="th-q"></div>
      <div class="th-months" id="th-m"></div>
    </div>
  </div>

  <div id="rows"></div>

  <div class="legend">
    <div class="leg-item"><div class="leg-sw" style="background:var(--gr)"></div>Done</div>
    <div class="leg-item"><div class="leg-sw" style="background:var(--am);opacity:.85"></div>Remaining (Enh)</div>
    <div class="leg-item"><div class="leg-sw" style="background:var(--re);opacity:.6"></div>Remaining (Bug)</div>
    <div class="leg-item"><div class="leg-di" style="background:var(--bl)"></div>Target date</div>
    <div class="leg-sep"></div>
    <div class="leg-item">
      <span class="leg-tag tag-enh">ENH</span>Enhancement
    </div>
    <div class="leg-item">
      <span class="leg-tag tag-bug">BUG</span>Bug
    </div>
    <div class="leg-sep"></div>
    <div class="leg-item"><div class="leg-ln" style="background:rgba(211,111,104,.6)"></div>Release cut</div>
    <div class="leg-item"><div class="leg-ln" style="background:var(--today)"></div>Today</div>
  </div>
</div>

<script>
const YEAR = 2026;
const VIEW_START = new Date(2026,0,1);
const VIEW_END   = new Date(2026,11,31);
const TOTAL_MS   = VIEW_END - VIEW_START;

const MONTHS = [
  {m:0,lbl:'Jan'},{m:1,lbl:'Feb'},{m:2,lbl:'Mar'},
  {m:3,lbl:'Apr'},{m:4,lbl:'May'},{m:5,lbl:'Jun'},
  {m:6,lbl:'Jul'},{m:7,lbl:'Aug'},{m:8,lbl:'Sep'},
  {m:9,lbl:'Oct'},{m:10,lbl:'Nov'},{m:11,lbl:'Dec'},
];
const QUARTERS = [
  {lbl:'Q1 · 2026', months:[0,1,2]},
  {lbl:'Q2 · 2026', months:[3,4,5]},
  {lbl:'Q3 · 2026', months:[6,7,8]},
  {lbl:'Q4 · 2026', months:[9,10,11]},
];
const RELEASES = [
  {lbl:'R1', date:new Date(2026,2,31), cls:'rel-r1'},
  {lbl:'R2', date:new Date(2026,5,30), cls:'rel-r2'},
  {lbl:'R3', date:new Date(2026,8,30), cls:'rel-r3'},
  {lbl:'R4', date:new Date(2026,11,18),cls:'rel-r4'},
];
const FN_COLORS = ['var(--bl)','var(--gr)','var(--pu)','var(--am)'];

function daysInMonth(y,m){ return new Date(y,m+1,0).getDate(); }
const totalDays = MONTHS.reduce((s,{m})=>s+daysInMonth(YEAR,m),0);
function xPct(d){ return Math.max(0,Math.min(100,(d-VIEW_START)/TOTAL_MS*100)).toFixed(3)+'%'; }
function xRange(s,e){
  const sp=Math.max(0,(s-VIEW_START)/TOTAL_MS);
  const ep=Math.min(1,(e-VIEW_START)/TOTAL_MS);
  return {l:(sp*100).toFixed(3)+'%', w:((ep-sp)*100).toFixed(3)+'%'};
}

// ── DATA — enhancements and bugs mixed under the same functions ────────────────
const DATA = [
  {
    dev:'Dhananjai Kalra', pct:42,
    fns:[
      { name:'Business Central', color:0, pct:30, rel:'R2', relCls:'rel-r2',
        items:[
          {type:'enh', id:'#40564', title:'WEB | API Deck – Dynamics BC integration', start:new Date(2026,0,15), end:new Date(2026,5,30), done:55, rel:'R2', relCls:'rel-r2'},
          {type:'bug', id:'#40891', title:'Fix: BC sync drops line items on retry',   start:new Date(2026,1,1),  end:new Date(2026,2,31), done:80, rel:'R1', relCls:'rel-r1'},
          {type:'bug', id:'#41203', title:'Fix: Duplicate vendor records after import',start:new Date(2026,2,10), end:new Date(2026,5,30), done:0,  rel:'R2', relCls:'rel-r2'},
        ]
      },
      { name:'Smart Scan', color:1, pct:65, rel:'R3', relCls:'rel-r3',
        items:[
          {type:'enh', id:'#37047', title:'WEB | Smart Scan | User-facing redesign', start:new Date(2026,1,1),  end:new Date(2026,5,20), done:80, rel:'R2', relCls:'rel-r2'},
          {type:'bug', id:'#39554', title:'Fix: OCR misreads handwritten amounts',   start:new Date(2026,3,1),  end:new Date(2026,5,30), done:35, rel:'R2', relCls:'rel-r2'},
          {type:'enh', id:'#34422', title:'WEB | Smart Scan | Admin panel upgrades', start:new Date(2026,5,5),  end:new Date(2026,8,30), done:0,  rel:'R3', relCls:'rel-r3'},
        ]
      },
    ]
  },
  {
    dev:'Nitesh Bagdi', pct:38,
    fns:[
      { name:'Voice', color:0, pct:60, rel:'R2', relCls:'rel-r2',
        items:[
          {type:'enh', id:'#41001', title:'WEB | Voice input – Search results',    start:new Date(2026,0,1),  end:new Date(2026,5,31), done:72, rel:'R2', relCls:'rel-r2'},
          {type:'bug', id:'#41087', title:'Fix: Voice recognition drops on iOS 17', start:new Date(2026,1,15), end:new Date(2026,2,31), done:100,rel:'R1', relCls:'rel-r1'},
          {type:'enh', id:'#41002', title:'WEB | Voice input – Form autofill',     start:new Date(2026,4,1),  end:new Date(2026,8,15), done:15, rel:'R3', relCls:'rel-r3'},
        ]
      },
      { name:'Projects & Budgets', color:2, pct:38, rel:'R2', relCls:'rel-r2',
        items:[
          {type:'enh', id:'#41100', title:'WEB | Budget approval workflow',         start:new Date(2026,1,10), end:new Date(2026,5,30), done:38, rel:'R2', relCls:'rel-r2'},
          {type:'bug', id:'#41155', title:'Fix: Budget overage alert not firing',    start:new Date(2026,2,1),  end:new Date(2026,3,30), done:60, rel:'R2', relCls:'rel-r2'},
        ]
      },
    ]
  },
];

// ── HEADER ─────────────────────────────────────────────────────────────────────
function buildHeader(){
  const today=new Date();
  const qEl=document.getElementById('th-q');
  QUARTERS.forEach(q=>{
    const days=q.months.reduce((s,m)=>s+daysInMonth(YEAR,m),0);
    const d=document.createElement('div'); d.className='th-q';
    d.style.width=(days/totalDays*100).toFixed(2)+'%'; d.textContent=q.lbl;
    qEl.appendChild(d);
  });
  const mEl=document.getElementById('th-m');
  MONTHS.forEach(({m,lbl})=>{
    const days=daysInMonth(YEAR,m);
    const d=document.createElement('div');
    d.className='th-m'+(today.getMonth()===m&&today.getFullYear()===YEAR?' cur':'');
    d.style.width=(days/totalDays*100).toFixed(2)+'%'; d.textContent=lbl;
    mEl.appendChild(d);
  });
}

// ── DIVIDERS + OVERLAYS ────────────────────────────────────────────────────────
function dividers(){
  let h=''; let acc=0;
  MONTHS.forEach(({m},i)=>{
    if(i>0) h+=`<div class="tl-mdiv" style="left:${(acc/totalDays*100).toFixed(2)}%"></div>`;
    acc+=daysInMonth(YEAR,m);
  });
  RELEASES.forEach(r=>{
    const p=xPct(r.date);
    h+=`<div class="tl-rel-line" style="left:${p}"></div>`;
    h+=`<div class="tl-rel-lbl"  style="left:${p}">${r.lbl}</div>`;
  });
  const t=new Date();
  if(t>=VIEW_START&&t<=VIEW_END){
    const p=xPct(t);
    h+=`<div class="tl-today"      style="left:${p}"></div>`;
    h+=`<div class="tl-today-lbl"  style="left:${p}">TODAY</div>`;
  }
  return h;
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function progCell(pct){
  const color=pct===100?'var(--gr)':pct>50?'var(--bl)':pct>20?'var(--am)':'var(--re)';
  return `<div class="prog-wrap">
    <div class="prog-label">${pct}%</div>
    <div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function itemBar(item){
  // bugs: remaining portion is red-tinted; enhancements: amber
  const remColor = item.type==='bug' ? 'rgba(211,111,104,0.6)' : 'var(--am)';
  const {l,w}=xRange(item.start,item.end);
  let bar='';
  if(item.done>0)
    bar+=`<div style="width:${item.done}%;height:100%;background:var(--gr);border-radius:${item.done<100?'3px 0 0 3px':'3px'}"></div>`;
  if(item.done<100)
    bar+=`<div style="width:${100-item.done}%;height:100%;background:${remColor};border-radius:${item.done>0?'0 3px 3px 0':'3px'}"></div>`;
  const ms=`<div class="tl-ms" style="left:calc(${xPct(item.end)} - 4.5px);background:var(--bl)"></div>`;
  return `<div class="tl-bar" style="left:${l};width:${w}">${bar}</div>${ms}`;
}

// ── BUILD ROWS ─────────────────────────────────────────────────────────────────
function buildRows(){
  const container=document.getElementById('rows');
  let html='';
  const dvd=dividers();

  DATA.forEach((dev,di)=>{
    // ── DEVELOPER ROW ────────────────────────────────────────────────────────
    html+=`<div class="row" style="${di>0?'border-top:1.5px solid var(--b1)':''}">
      <div class="c-dev" style="height:34px;display:flex;align-items:center;padding:0 8px 0 0;border-right:0.5px solid var(--col-div);background:var(--sf)">
        <div style="width:3px;align-self:stretch;flex-shrink:0;background:var(--ac);border-radius:1px;margin-right:8px"></div>
        <button style="background:none;border:none;cursor:pointer;color:var(--ac);font-size:10px;padding:0 4px 0 0;line-height:1;flex-shrink:0">▼</button>
        <div style="overflow:hidden;flex:1;min-width:0">
          <span style="font-size:11px;font-weight:600;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">${dev.dev}</span>
          <span style="font-size:9px;color:var(--t2)">${dev.pct}% overall</span>
        </div>
      </div>
      <div class="c-fn"   style="height:34px;background:var(--sf);border-right:0.5px solid var(--b2)"></div>
      <div class="c-rel"  style="height:34px;background:var(--sf);border-right:0.5px solid var(--b2)"></div>
      <div class="c-prog" style="height:34px;background:var(--sf);border-right:0.5px solid var(--b1);display:flex;align-items:center;padding:0 10px">${progCell(dev.pct)}</div>
      <div class="c-tl"   style="height:34px;position:relative">${dvd}</div>
    </div>`;

    dev.fns.forEach((fn,fi)=>{
      const fnColor=FN_COLORS[fi%FN_COLORS.length];
      const fnS=new Date(Math.min(...fn.items.map(e=>e.start)));
      const fnE=new Date(Math.max(...fn.items.map(e=>e.end)));
      const {l:fl,w:fw}=xRange(fnS,fnE);

      // ── FUNCTION ROW ──────────────────────────────────────────────────────
      html+=`<div class="row">
        <div class="c-dev"  style="height:30px;background:var(--ra);border-right:0.5px solid var(--col-div)"></div>
        <div class="c-fn"   style="height:30px;display:flex;align-items:center;padding:0 8px;gap:5px;border-right:0.5px solid var(--b2)">
          <button style="background:none;border:none;cursor:pointer;color:var(--t3);font-size:9px;padding:0 4px 0 0;line-height:1;flex-shrink:0">▼</button>
          <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${fnColor}"></div>
          <span style="font-size:11px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${fn.name}</span>
          <span style="font-size:9px;color:var(--t2);flex-shrink:0">${fn.pct}%</span>
        </div>
        <div class="c-rel"  style="height:30px;background:var(--ra);border-right:0.5px solid var(--b2);display:flex;align-items:center;justify-content:center">
          <span class="rel-pill ${fn.relCls}">${fn.rel}</span>
        </div>
        <div class="c-prog" style="height:30px;background:var(--ra);border-right:0.5px solid var(--b1);display:flex;align-items:center;padding:0 10px">${progCell(fn.pct)}</div>
        <div class="c-tl"   style="height:30px;position:relative;background:var(--ra)">
          ${dvd}
          <div class="tl-fn-bar" style="left:${fl};width:${fw};background:${fnColor}"></div>
        </div>
      </div>`;

      // ── ITEM ROWS (enhancements + bugs mixed) ─────────────────────────────
      fn.items.forEach(item=>{
        const isBug = item.type==='bug';
        const tagHtml = isBug
          ? `<span class="tag tag-bug">BUG</span>`
          : `<span class="tag tag-enh">ENH</span>`;

        html+=`<div class="row" style="background:var(--pg)">
          <div class="c-dev"  style="height:36px;background:var(--pg);border-right:0.5px solid var(--col-div)"></div>
          <div class="c-fn"   style="height:36px;display:flex;align-items:center;padding:0 8px 0 14px;gap:5px;border-right:0.5px solid var(--b2);overflow:hidden">
            ${tagHtml}
            <span style="font-size:9px;color:var(--t3);flex-shrink:0">${item.id}</span>
            <span style="font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0">${item.title}</span>
          </div>
          <div class="c-rel"  style="height:36px;background:var(--pg);border-right:0.5px solid var(--b2);display:flex;align-items:center;justify-content:center">
            <span class="rel-pill ${item.relCls}">${item.rel}</span>
          </div>
          <div class="c-prog" style="height:36px;background:var(--pg);border-right:0.5px solid var(--b1);display:flex;align-items:center;padding:0 10px">${progCell(item.done)}</div>
          <div class="c-tl"   style="height:36px;position:relative">${dvd}${itemBar(item)}</div>
        </div>`;
      });
    });
  });

  container.innerHTML=html;
}

function setMode(mode){
  document.getElementById('gantt').className='wrap '+mode;
  ['tgl-dark','tgl-light'].forEach(id=>{
    const active=(id==='tgl-dark'&&mode==='dark')||(id==='tgl-light'&&mode==='light');
    document.getElementById(id).style.cssText=active
      ?'background:rgba(117,168,177,.15);border-color:#75A8B1;color:#9EC9D0;font-family:inherit'
      :'background:transparent;border-color:#555;color:#888;font-family:inherit';
  });
}

buildHeader();
buildRows();
setMode('dark');
</script>
</body>
